<!DOCTYPE html>
<html lang="fr-CA">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- PWA / iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Paiements" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0f172a" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <link rel="manifest" href="manifest.json" />
  <title>Mes Paiements</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: #f1f5f9; overscroll-behavior-y: none; }
    /* Safe area pour iPhone avec notch / Dynamic Island */
    .safe-top    { padding-top: env(safe-area-inset-top); }
    .safe-bottom { padding-bottom: max(env(safe-area-inset-bottom), 16px); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;
    const STORAGE_KEY = "mes-paiements-v1";

    const BILLS = [
      { id:"hydro",        name:"Hydro-Québec",      amount:246.13, days:[1],     account:"Perso",     emoji:"⚡" },
      { id:"energir",      name:"Energir",            amount:77.28,  days:[1],     account:"Perso",     emoji:"🔥" },
      { id:"taxes-mun",    name:"Taxes municipales",  amount:500.00, days:[15],    account:"Perso",     emoji:"🏛️" },
      { id:"taxes-sco",    name:"Taxes scolaires",    amount:32.46,  days:[1],     account:"Perso",     emoji:"🏫" },
      { id:"ebox",         name:"Ebox Internet",      amount:75.00,  days:[15],    account:"Perso",     emoji:"📡" },
      { id:"assur-vie",    name:"Assurances vie",     amount:227.00, days:[9],     account:"Perso",     emoji:"❤️" },
      { id:"pret-fen",     name:"Prêt fenêtres",      amount:102.73, days:[1],     account:"Perso",     emoji:"🪟" },
      { id:"telus-tel",    name:"Telus téléphone",    amount:99.00,  days:[15],    account:"Perso",     emoji:"📱" },
      { id:"assur-maison", name:"Assurances maison",  amount:139.00, days:[1],     account:"Perso",     emoji:"🏠" },
      { id:"alarme",       name:"Telus Alarme",        amount:45.00,  days:[1],     account:"Perso",     emoji:"🔒" },
      { id:"assur-auto",   name:"Assurances auto",    amount:175.00, days:[20],    account:"Perso",     emoji:"🚗" },
      { id:"marge",        name:"Marge de crédit",    amount:100.00, days:[1],     account:"Perso",     emoji:"💳" },
      { id:"hypotheque",   name:"Hypothèque",          amount:972.02, days:[1, 15], account:"Conjoints", emoji:"🏡" },
      { id:"pmt-auto-1",   name:"Paiement auto",      amount:479.00, days:[1],     account:"Conjoints", emoji:"🚙" },
      { id:"pmt-auto-20",  name:"Paiement auto",      amount:479.00, days:[20],    account:"Conjoints", emoji:"🚙" },
    ];

    // ─── Congés QC + Canada ────────────────────────────────────────────────
    function getEaster(y){const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),mo=Math.floor((h+l-7*m+114)/31),dy=((h+l-7*m+114)%31)+1;return new Date(y,mo-1,dy);}
    function prevMon(y,mo,mx){const d=new Date(y,mo,mx);while(d.getDay()!==1)d.setDate(d.getDate()-1);return d;}
    function nextMon(y,mo){const d=new Date(y,mo,1);while(d.getDay()!==1)d.setDate(d.getDate()+1);return d;}
    const HC={};
    function getHolidays(y){if(HC[y])return HC[y];const s=new Set(),a=d=>s.add(d.toDateString());a(new Date(y,0,1));const e=getEaster(y),gf=new Date(e);gf.setDate(e.getDate()-2);a(gf);const em=new Date(e);em.setDate(e.getDate()+1);a(em);a(prevMon(y,4,25));a(new Date(y,5,24));a(new Date(y,6,1));a(nextMon(y,8));const fm=nextMon(y,9),t=new Date(fm);t.setDate(fm.getDate()+7);a(t);a(new Date(y,11,25));a(new Date(y,11,26));HC[y]=s;return s;}
    const isHol=d=>getHolidays(d.getFullYear()).has(d.toDateString());
    const isWkd=d=>d.getDay()===0||d.getDay()===6;
    function prevBD(dt){const d=new Date(dt);while(isWkd(d)||isHol(d))d.setDate(d.getDate()-1);return d;}
    function getPeriodEnd(d){const y=d.getFullYear(),m=d.getMonth(),a15=prevBD(new Date(y,m,15));const p1End=a15.getDate()===15?new Date(y,m,14):a15;return d.getTime()<=p1End.getTime()?p1End:new Date(y,m+1,0);}

    // ─── Génération paiements ──────────────────────────────────────────────
    function generatePayments(monthsAhead=10){
      const today=new Date();today.setHours(0,0,0,0);
      const p=[];
      for(let m=-1;m<=monthsAhead;m++){
        const ref=new Date(today.getFullYear(),today.getMonth()+m,1);
        const yr=ref.getFullYear(),mo=ref.getMonth();
        BILLS.forEach(b=>b.days.forEach(day=>{
          const nom=new Date(yr,mo,day),adj=prevBD(new Date(nom));
          const wasAdjusted=adj.toDateString()!==nom.toDateString();
          const key=`${b.id}-${yr}-${mo}-${day}`;
          p.push({key,name:b.name,amount:b.amount,account:b.account,emoji:b.emoji,nominal:nom,adjusted:adj,wasAdjusted});
        }));
      }
      return p.sort((a,b)=>a.adjusted-b.adjusted);
    }

    const $=n=>n.toLocaleString("fr-CA",{minimumFractionDigits:2,maximumFractionDigits:2})+" $";
    const fd=(d,o)=>d.toLocaleDateString("fr-CA",o);
    function daysUntil(d){const t=new Date();t.setHours(0,0,0,0);return Math.round((d-t)/86400000);}

    // ─── App ───────────────────────────────────────────────────────────────
    function App(){
      const today=new Date();today.setHours(0,0,0,0);
      const END=new Date(2026,11,31);

      const [paid,setPaid]=useState(()=>{try{const s=localStorage.getItem(STORAGE_KEY);return s?JSON.parse(s):{};}catch{return{};}});
      useEffect(()=>{try{localStorage.setItem(STORAGE_KEY,JSON.stringify(paid));}catch{}},[paid]);

      const [tab,setTab]=useState("upcoming");
      const [showPast,setShowPast]=useState(false);
      const [expandedGroups,setExpandedGroups]=useState({});

      const allPayments=useMemo(()=>generatePayments(10),[]);
      const upcoming=allPayments.filter(p=>daysUntil(p.adjusted)>=0&&p.adjusted<=END);
      const past=allPayments.filter(p=>daysUntil(p.adjusted)<0);

      const groups=useMemo(()=>{
        const map={};
        upcoming.forEach(p=>{const k=p.adjusted.toDateString();if(!map[k])map[k]={date:p.adjusted,items:[]};map[k].items.push(p);});
        return Object.values(map).sort((a,b)=>a.date-b.date);
      },[upcoming]);

      const curY=today.getFullYear(),curM=today.getMonth();
      const curMonthLabel=fd(today,{month:"short"});
      const lastDayOfMonth=new Date(curY,curM+1,0).getDate();
      const payDay15=prevBD(new Date(curY,curM,15));
      const p1End=new Date(payDay15.getTime()-86400000);
      const p1EndDay=p1End.getDate();
      const p2StartDayNum=payDay15.getDate();
      const p1Pmts=allPayments.filter(p=>p.adjusted>=new Date(curY,curM,1)&&p.adjusted<=p1End&&!paid[p.key]);
      const p2Pmts=allPayments.filter(p=>p.adjusted>=payDay15&&p.adjusted<=new Date(curY,curM+1,0)&&!paid[p.key]);
      const persoP1=p1Pmts.filter(p=>p.account==="Perso").reduce((s,p)=>s+p.amount,0);
      const conjP1=p1Pmts.filter(p=>p.account==="Conjoints").reduce((s,p)=>s+p.amount,0);
      const persoP2=p2Pmts.filter(p=>p.account==="Perso").reduce((s,p)=>s+p.amount,0);
      const conjP2=p2Pmts.filter(p=>p.account==="Conjoints").reduce((s,p)=>s+p.amount,0);

      const monthlyGroups=useMemo(()=>{
        const map={};
        upcoming.forEach(p=>{
          const key=`${p.adjusted.getFullYear()}-${p.adjusted.getMonth()}`;
          const label=fd(p.adjusted,{month:"long",year:"numeric"});
          if(!map[key])map[key]={label,year:p.adjusted.getFullYear(),month:p.adjusted.getMonth(),perso:0,conjoints:0,items:[]};
          if(p.account==="Perso")map[key].perso+=p.amount;else map[key].conjoints+=p.amount;
          map[key].items.push(p);
        });
        return Object.values(map).sort((a,b)=>a.year!==b.year?a.year-b.year:a.month-b.month);
      },[upcoming]);

      const isExpanded=(ds,days)=>ds in expandedGroups?expandedGroups[ds]:days<=30;
      const toggleGroup=(ds,cur)=>setExpandedGroups(p=>({...p,[ds]:!cur}));
      const toggle=key=>setPaid(p=>{if(p[key]){const n={...p};delete n[key];return n;}return{...p,[key]:new Date().toISOString()};});

      const urg=days=>
        days===0?{border:"2px solid #ef4444",bg:"#fef2f2",tagBg:"#fee2e2",tagColor:"#b91c1c",label:"Aujourd'hui !"}:
        days===1?{border:"2px solid #f97316",bg:"#fff7ed",tagBg:"#ffedd5",tagColor:"#c2410c",label:"Demain"}:
        days<=7 ?{border:"2px solid #eab308",bg:"#fefce8",tagBg:"#fef9c3",tagColor:"#854d0e",label:`Dans ${days} jours`}:
                 {border:"2px solid #e2e8f0",bg:"white",  tagBg:"#f1f5f9",tagColor:"#475569",label:`Dans ${days} jours`};

      const pill=(bg,color)=>({background:bg,color,fontSize:11,fontWeight:600,padding:"2px 8px",borderRadius:20,whiteSpace:"nowrap"});
      const card={background:"white",borderRadius:20,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.08)"};

      return (
        <div style={{fontFamily:"system-ui,-apple-system,sans-serif",background:"#f1f5f9",minHeight:"100vh"}}>

          {/* ── Header ── */}
          <div className="safe-top" style={{background:"linear-gradient(135deg,#1e293b 0%,#0f172a 100%)",color:"white",paddingLeft:16,paddingRight:16,paddingBottom:20}}>
            <div style={{paddingTop:16,display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18}}>
              <div>
                <h1 style={{margin:0,fontSize:20,fontWeight:800,letterSpacing:-0.5}}>💰 Mes Paiements</h1>
                <p style={{margin:"3px 0 0",color:"#94a3b8",fontSize:12}}>{fd(today,{weekday:"long",day:"numeric",month:"long"})}</p>
              </div>
              <div style={{background:"rgba(255,255,255,0.08)",borderRadius:10,padding:"5px 10px",fontSize:12,color:"#94a3b8"}}>
                {upcoming.filter(p=>!paid[p.key]).length} à venir
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              {[
                {label:"Perso",   p1:persoP1,p2:persoP2,faded:"#93c5fd",softBg:"rgba(59,130,246,0.15)",border:"rgba(59,130,246,0.3)"},
                {label:"Conjoints",p1:conjP1, p2:conjP2, faded:"#6ee7b7",softBg:"rgba(16,185,129,0.15)",border:"rgba(16,185,129,0.3)"},
              ].map(({label,p1,p2,faded,softBg,border})=>(
                <div key={label} style={{background:softBg,border:`1px solid ${border}`,borderRadius:16,padding:"11px 13px"}}>
                  <p style={{margin:"0 0 7px",color:faded,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>{label}</p>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:4}}>
                    <span style={{color:faded,fontSize:9}}>1–{p1EndDay} {curMonthLabel}</span>
                    <span style={{color:"white",fontSize:13,fontWeight:800}}>{$(p1)}</span>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
                    <span style={{color:faded,fontSize:9}}>{p2StartDayNum}–{lastDayOfMonth} {curMonthLabel}</span>
                    <span style={{color:"white",fontSize:13,fontWeight:800}}>{$(p2)}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* ── Tabs ── */}
          <div style={{padding:"12px 16px 0",position:"sticky",top:0,zIndex:10,background:"#f1f5f9"}}>
            <div style={{display:"flex",gap:4,background:"#e2e8f0",borderRadius:12,padding:3}}>
              {[["upcoming","📅 À venir"],["summary","📊 Récap"]].map(([k,l])=>(
                <button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:"9px 0",border:"none",cursor:"pointer",fontWeight:600,fontSize:13,borderRadius:10,transition:"all .15s",background:tab===k?"#0f172a":"transparent",color:tab===k?"white":"#64748b"}}>
                  {l}
                </button>
              ))}
            </div>
          </div>

          {/* ── Contenu ── */}
          <div className="safe-bottom" style={{maxWidth:600,margin:"0 auto",padding:"12px 16px 32px"}}>

            {/* ══ À venir ══ */}
            {tab==="upcoming"&&(
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                {groups.map(({date,items})=>{
                  const days=daysUntil(date),u=urg(days);
                  const unpaid=items.filter(p=>!paid[p.key]);
                  const allDone=unpaid.length===0;
                  const pEnd=getPeriodEnd(date);
                  const regItems=upcoming.filter(p=>p.adjusted>=date&&p.adjusted<=pEnd&&!paid[p.key]);
                  const pAmt=regItems.filter(p=>p.account==="Perso").reduce((s,p)=>s+p.amount,0);
                  const cAmt=regItems.filter(p=>p.account==="Conjoints").reduce((s,p)=>s+p.amount,0);
                  const ds=date.toDateString();
                  const exp=isExpanded(ds,days);
                  return(
                    <div key={ds} style={{border:u.border,background:u.bg,borderRadius:18,overflow:"hidden",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
                      <div onClick={()=>toggleGroup(ds,exp)} style={{padding:"13px 16px",borderBottom:exp?"1px solid rgba(0,0,0,0.05)":"none",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer",userSelect:"none"}}>
                        <div>
                          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                            <span style={{fontWeight:700,fontSize:14,color:"#0f172a"}}>{fd(date,{weekday:"long",day:"numeric",month:"long"})}</span>
                            {allDone&&<span style={pill("#dcfce7","#15803d")}>✓ Tout payé</span>}
                          </div>
                          <span style={{...pill(u.tagBg,u.tagColor),display:"inline-block",marginTop:3}}>{u.label}</span>
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:10}}>
                          <div style={{textAlign:"right"}}>
                            {(pAmt>0||cAmt>0)&&<div style={{color:"#94a3b8",fontSize:9,marginBottom:2}}>solde au {fd(pEnd,{day:"numeric",month:"short"})}</div>}
                            {pAmt>0&&<div style={{color:"#1d4ed8",fontSize:12,fontWeight:700}}>Perso : {$(pAmt)}</div>}
                            {cAmt>0&&<div style={{color:"#047857",fontSize:12,fontWeight:700}}>Conjoints : {$(cAmt)}</div>}
                          </div>
                          <span style={{color:"#94a3b8",fontSize:14,flexShrink:0,display:"inline-block",transition:"transform .2s",transform:exp?"rotate(0deg)":"rotate(-90deg)"}}>▾</span>
                        </div>
                      </div>
                      {exp&&items.map((p,idx)=>{
                        const done=!!paid[p.key];
                        return(
                          <div key={p.key} style={{padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:idx<items.length-1?"1px solid rgba(0,0,0,0.04)":"none",opacity:done?0.45:1}}>
                            <div style={{display:"flex",alignItems:"center",gap:10}}>
                              <span style={{fontSize:20}}>{p.emoji}</span>
                              <div>
                                <p style={{margin:0,fontWeight:600,fontSize:14,color:"#0f172a",textDecoration:done?"line-through":"none"}}>{p.name}</p>
                                <div style={{display:"flex",gap:5,marginTop:3,flexWrap:"wrap",alignItems:"center"}}>
                                  <span style={pill(p.account==="Perso"?"#dbeafe":"#d1fae5",p.account==="Perso"?"#1e40af":"#065f46")}>{p.account}</span>
                                  {p.wasAdjusted&&<span style={pill("#fef3c7","#92400e")}>📅 Ajusté du {p.nominal.getDate()}</span>}
                                  {done&&paid[p.key]&&<span style={{color:"#16a34a",fontSize:11}}>Payé le {fd(new Date(paid[p.key]),{day:"numeric",month:"short"})}</span>}
                                </div>
                              </div>
                            </div>
                            <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
                              <span style={{fontWeight:700,fontSize:14,color:"#0f172a",textDecoration:done?"line-through":"none"}}>{$(p.amount)}</span>
                              <button onClick={()=>toggle(p.key)} style={{width:34,height:34,borderRadius:"50%",border:"none",cursor:"pointer",background:done?"#22c55e":"#f1f5f9",color:done?"white":"#94a3b8",fontSize:16,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                                {done?"✓":"○"}
                              </button>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })}

                {past.length>0&&(
                  <div>
                    <button onClick={()=>setShowPast(!showPast)} style={{width:"100%",padding:"13px 16px",background:"white",border:"2px solid #e2e8f0",borderRadius:16,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:14,fontWeight:600,color:"#475569"}}>
                      <span>📜 Paiements passés ({past.length})</span>
                      <span style={{color:"#94a3b8"}}>{showPast?"▲":"▼"}</span>
                    </button>
                    {showPast&&(
                      <div style={{marginTop:8,...card}}>
                        {[...past].reverse().slice(0,30).map((p,idx)=>{
                          const done=!!paid[p.key];
                          return(
                            <div key={p.key} style={{padding:"11px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:idx<Math.min(past.length,30)-1?"1px solid #f1f5f9":"none"}}>
                              <div style={{display:"flex",alignItems:"center",gap:10}}>
                                <span style={{fontSize:18}}>{p.emoji}</span>
                                <div>
                                  <p style={{margin:0,fontSize:13,fontWeight:600,color:"#334155"}}>{p.name}</p>
                                  <div style={{display:"flex",gap:5,marginTop:2,alignItems:"center"}}>
                                    <span style={{fontSize:11,color:"#94a3b8"}}>{fd(p.adjusted,{day:"numeric",month:"short"})}{p.wasAdjusted?" · ajusté":""}</span>
                                    <span style={pill(p.account==="Perso"?"#dbeafe":"#d1fae5",p.account==="Perso"?"#1e40af":"#065f46")}>{p.account}</span>
                                  </div>
                                </div>
                              </div>
                              <div style={{display:"flex",alignItems:"center",gap:8}}>
                                <span style={{fontSize:13,fontWeight:700,color:"#334155"}}>{$(p.amount)}</span>
                                <button onClick={()=>toggle(p.key)} style={{width:28,height:28,borderRadius:"50%",border:"none",cursor:"pointer",background:done?"#22c55e":"#f1f5f9",color:done?"white":"#94a3b8",fontSize:13,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>
                                  {done?"✓":"○"}
                                </button>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                )}
              </div>
            )}

            {/* ══ Récapitulatif ══ */}
            {tab==="summary"&&(
              <div style={{display:"flex",flexDirection:"column",gap:14}}>
                <div style={{...card,padding:18}}>
                  <h3 style={{margin:"0 0 14px",fontSize:14,fontWeight:700,color:"#0f172a"}}>Totaux mensuels estimés</h3>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                    {[
                      {label:"Perso",bills:BILLS.filter(b=>b.account==="Perso"),bg:"#eff6ff",border:"#bfdbfe",text:"#1e40af"},
                      {label:"Conjoints",bills:BILLS.filter(b=>b.account==="Conjoints"),bg:"#f0fdf4",border:"#bbf7d0",text:"#065f46"},
                    ].map(({label,bills,bg,border,text})=>{
                      const total=bills.reduce((s,b)=>s+b.amount*b.days.length,0);
                      return(
                        <div key={label} style={{background:bg,border:`1px solid ${border}`,borderRadius:14,padding:14}}>
                          <p style={{margin:"0 0 3px",color:text,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:0.8}}>{label}</p>
                          <p style={{margin:"0 0 2px",color:"#0f172a",fontSize:20,fontWeight:800,letterSpacing:-0.5}}>{$(total)}</p>
                          <p style={{margin:0,color:"#64748b",fontSize:10}}>/ mois · {bills.length} factures</p>
                        </div>
                      );
                    })}
                  </div>
                </div>

                {monthlyGroups.map(({label,perso,conjoints,items})=>(
                  <div key={label} style={card}>
                    <div style={{padding:"13px 16px",background:"#f8fafc",borderBottom:"1px solid #f1f5f9",display:"flex",justifyContent:"space-between"}}>
                      <span style={{fontWeight:700,fontSize:13,color:"#0f172a",textTransform:"capitalize"}}>{label}</span>
                      <span style={{fontWeight:700,fontSize:13,color:"#0f172a"}}>{$(perso+conjoints)}</span>
                    </div>
                    {(()=>{
                      const byDate={};
                      items.forEach(p=>{const k=p.adjusted.toDateString();if(!byDate[k])byDate[k]={date:p.adjusted,perso:0,conjoints:0};if(p.account==="Perso")byDate[k].perso+=p.amount;else byDate[k].conjoints+=p.amount;});
                      return Object.values(byDate).sort((a,b)=>a.date-b.date).map((g,idx,arr)=>(
                        <div key={g.date.toDateString()} style={{padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:idx<arr.length-1?"1px solid #f8fafc":"none"}}>
                          <span style={{fontSize:12,fontWeight:600,color:"#334155"}}>{fd(g.date,{weekday:"short",day:"numeric",month:"short"})}</span>
                          <div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"flex-end"}}>
                            {g.perso>0&&<span style={pill("#dbeafe","#1e40af")}>Perso {$(g.perso)}</span>}
                            {g.conjoints>0&&<span style={pill("#d1fae5","#065f46")}>Conjoints {$(g.conjoints)}</span>}
                          </div>
                        </div>
                      ));
                    })()}
                  </div>
                ))}

                <div style={card}>
                  <div style={{padding:"13px 16px",background:"#f8fafc",borderBottom:"1px solid #f1f5f9"}}>
                    <span style={{fontWeight:700,fontSize:13,color:"#0f172a"}}>Toutes les factures</span>
                  </div>
                  {BILLS.map((b,idx)=>(
                    <div key={b.id} style={{padding:"11px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:idx<BILLS.length-1?"1px solid #f8fafc":"none"}}>
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <span style={{fontSize:18}}>{b.emoji}</span>
                        <div>
                          <p style={{margin:0,fontSize:13,fontWeight:600,color:"#334155"}}>{b.name}</p>
                          <p style={{margin:0,fontSize:11,color:"#94a3b8"}}>{b.days.map(d=>`le ${d}`).join(" et ")} du mois</p>
                        </div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <span style={{fontWeight:700,fontSize:13,color:"#0f172a"}}>{$(b.amount)}</span>
                        <div style={{marginTop:2}}><span style={pill(b.account==="Perso"?"#dbeafe":"#d1fae5",b.account==="Perso"?"#1e40af":"#065f46")}>{b.account}</span></div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            <p style={{textAlign:"center",color:"#cbd5e1",fontSize:10,marginTop:24}}>
              Dates ajustées aux jours ouvrables · Congés QC + Canada
            </p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);

    // Service Worker
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js")
          .then(r => console.log("SW registered", r.scope))
          .catch(e => console.log("SW error", e));
      });
    }
  </script>
</body>
</html>
